name: Build, cache, and publish cursors

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://neonvoidx.cachix.org
            extra-trusted-public-keys = neonvoidx.cachix.org-1:nHFGhvzWqULuNWFbuPwTP0eUW+k7utl0chxXhUJhU1Y=

      - uses: cachix/cachix-action@v15
        with:
          name: neonvoidx
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build all cursor variants
        run: |
          nix build ".#default" --print-build-logs

      - name: Create per-variant zip archives
        run: |
          mkdir -p releases
          for theme in result/share/icons/eldritch-*-cursors; do
            name=$(basename "$theme")
            cd "$theme" && zip -ry "$OLDPWD/releases/$name" . && cd "$OLDPWD"
          done

      - name: Upload per-variant artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cursors
          path: releases/*.zip
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="nightly"
          [[ "${{ github.event_name }}" == "release" ]] && TAG="${{ github.event.release.tag_name }}"

          gh release create "$TAG" --title "Continuous build ($(date +%Y-%m-%d))" --notes "Latest cursors built from \`master\`." --prerelease 2>/dev/null || true

          for zip in releases/*.zip; do
            gh release upload "$TAG" "$zip" --clobber
          done
