name: Build and cache cursors

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://neonvoidx.cachix.org
            extra-trusted-public-keys = neonvoidx.cachix.org-1:nHFGhvzWqULuNWFbuPwTP0eUW+k7utl0chxXhUJhU1Y=

      - uses: cachix/cachix-action@v15
        with:
          name: neonvoidx
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build all cursor variants
        run: |
          nix build ".#default" \
            ".#great-old-green" ".#watery-tomb-blue" \
            ".#pustule-pink" ".#lovecraft-purple" \
            ".#rlyeh-red" ".#dreaming-orange" \
            ".#gold-of-yuggoth" ".#sunken-depths" \
            ".#lighthouse-white" \
            --print-build-logs

      - name: Create per-variant zip archives
        run: |
          mkdir -p releases
          for theme in result/share/icons/eldritch-*-cursors; do
            name=$(basename "$theme")
            cd "$theme" && zip -ry "$OLDPWD/releases/$name" . && cd "$OLDPWD"
          done

      - name: Upload per-variant artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cursors
          path: releases/*.zip
          if-no-files-found: error

  release:
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cursors
          path: cursors

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for zip in cursors/*.zip; do
            gh release upload "${{ github.event.release.tag_name }}" "$zip"
          done
