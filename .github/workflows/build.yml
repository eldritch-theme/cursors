name: Build cursors

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq inkscape xcursorgen python3 zip

      - name: Build all cursors
        run: ./build -p palettes/eldritch-cthulhu.json

      - name: Create per-variant zip archives
        run: ./scripts/create_zips

      - name: Upload per-variant artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cursors
          path: releases/*.zip
          if-no-files-found: error

  release:
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cursors
          path: cursors

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for zip in cursors/*.zip; do
            gh release upload "${{ github.event.release.tag_name }}" "$zip"
          done
