name: Build and cache cursors

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - uses: cachix/cachix-action@v15
        with:
          name: neonvoidx
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build all cursor variants
        run: |
          nix build ".#default" \
            ".#great-old-green" ".#watery-tomb-blue" \
            ".#pustule-pink" ".#lovecraft-purple" \
            ".#rlyeh-red" ".#dreaming-orange" \
            ".#gold-of-yuggoth" ".#sunken-depths" \
            ".#lighthouse-white" \
            --print-build-logs
